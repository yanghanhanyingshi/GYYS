name: IP代理爬虫

on:
  schedule:
    # 每12小时运行一次 (UTC时间)
    - cron: '0 */12 * * *'
  workflow_dispatch:
    # 允许手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 设置Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: 运行爬虫
      run: python crawler.py
      
    - name: 提交并推送结果
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add valid_ips.txt valid_ips_pure.txt valid_ips.json
        git diff --staged --quiet || git commit -m "自动更新IP列表 - $(date '+%Y-%m-%d %H:%M:%S')"
        git push
